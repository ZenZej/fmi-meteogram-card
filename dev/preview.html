<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fmi-meteogram-card — dev preview</title>
<style>
  /* Stand-in for HA theming so the card looks right outside Home Assistant.
     Dark by default (this mostly runs on a dark tablet); toggle with the button. */
  :root {
    --primary-text-color:#e9eff5; --secondary-text-color:#8fa0b1;
    --card-background-color:#182430; --ha-card-border-radius:16px;
    --ha-card-box-shadow:0 2px 16px rgba(0,0,0,.45); --page-bg:#0f1822;
  }
  :root[data-theme="light"] {
    --primary-text-color:#1f2a37; --secondary-text-color:#6b7683;
    --card-background-color:#ffffff; --ha-card-box-shadow:0 2px 12px rgba(30,50,80,.12); --page-bg:#f4f6f9;
  }
  body { margin:0; font-family:"Raleway", system-ui, sans-serif; background:var(--page-bg); }
  .wrap { max-width:560px; margin:24px auto; padding:0 16px; }
  .bar { display:flex; justify-content:flex-end; margin-bottom:8px; }
  button { font:inherit; font-size:12px; color:var(--secondary-text-color); background:transparent;
           border:1px solid var(--secondary-text-color); border-radius:8px; padding:4px 10px; cursor:pointer; }
  /* Minimal ha-card shim: the card renders <ha-card> inside its shadow root. */
  ha-card { display:block; background:var(--card-background-color);
            border-radius:var(--ha-card-border-radius); box-shadow:var(--ha-card-box-shadow); }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><button id="toggle">◐ theme</button></div>
  <fmi-meteogram-card id="card"></fmi-meteogram-card>
</div>

<script type="module">
import '../fmi-meteogram-card.js';

// ha-card shim so the card's <ha-card> element has a box in plain HTML.
if (!customElements.get('ha-card')) customElements.define('ha-card', class extends HTMLElement {});

const data = await (await fetch('./mock_data.json')).json();

// Build a minimal mock hass: states with forecast attributes + a callWS that
// answers the history query from the simulated outdoor-temperature series.
function mockHass(darkMode) {
  const states = {};
  for (const [id, forecast] of Object.entries(data)) {
    if (id === 'sensor.outdoor_temperature') continue;
    states[id] = { state: String(forecast[0]?.value ?? ''), attributes: { forecast } };
  }
  return {
    states,
    themes: { darkMode },
    async callWS(msg) {
      if (msg.type === 'history/history_during_period') {
        const rows = data['sensor.outdoor_temperature'].map(p => ({
          lu: Date.parse(p.datetime) / 1000, s: String(p.value),
        }));
        return { [msg.entity_ids[0]]: rows };
      }
      return {};
    },
  };
}

const card = document.getElementById('card');
card.setConfig({
  type: 'custom:fmi-meteogram-card',
  title: 'Helsinki',
  prefix: 'sensor.fmi_harmonie',
  outdoor_temperature: 'sensor.outdoor_temperature',
  hours_past: 12,
  hours_future: 24,
});

function apply() {
  const dark = document.documentElement.getAttribute('data-theme') !== 'light';
  card.hass = mockHass(dark);
}
apply();
document.getElementById('toggle').addEventListener('click', () => {
  const light = document.documentElement.getAttribute('data-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
  apply();
});
</script>
</body>
</html>
